cross:
  scope-rules:
    - >
      Факты с anchor в домене ZUP_cf описывают типовое поведение,
      владелец — вендор. Перехваты и расширение этого поведения
      описываются в доменах расширений и связываются через related.kb.
    - >
      Факт размещается в домене по anchor.path (где живёт код),
      а не по тому, кто его вызывает.
  fallback-domain: rg_UniversalnyjObmenXML
